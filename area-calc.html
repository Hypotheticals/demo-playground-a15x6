<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級幾何面積原理教學 V2.4</title>
    <style>
        :root {
            --primary: #6da3e5; 
            --secondary: #f39c12; 
            --success: #27ae60; 
            --error: #e74c3c;
            --bg: #f4f7f9;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 850px; width: 100%; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        select, input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        button { cursor: pointer; transition: 0.3s; background: #6da3e5; color: white; border: none; font-weight: bold; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #canvas-container { position: relative; width: 100%; height: 380px; border: 1px dashed #ccc; margin: 20px 0; overflow: hidden; background: #fff; border-radius: 10px; }
        .shape { transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.8; }
        .explanation { background: #f0f4f8; padding: 15px; border-radius: 8px; margin: 10px 0; min-height: 50px; color: #444; }
        .measure-line { stroke: #555; stroke-width: 1.2; stroke-dasharray: 4,3; }
        .measure-text { fill: #333; font-size: 13px; font-weight: bold; }
        .label-fade { animation: fadeIn 0.8s forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📐 幾何圖形面積原理教學 V2.4</h1>
    
    <div class="controls">
        <div class="input-group">
            <label>選擇圖形：</label>
            <select id="shapeType" onchange="resetUI()">
                <option value="parallelogram">平行四邊形 (割補)</option>
                <option value="triangle" selected>三角形 (拼湊)</option>
                <option value="trapezoid">梯形 (拼湊)</option>
            </select>
        </div>
        <div class="input-group">
            <label>底 (b):</label>
            <input type="number" id="val1" value="200" min="50" max="300">
        </div>
        <div class="input-group">
            <label>高 (h):</label>
            <input type="number" id="val2" value="120" min="50" max="200">
        </div>
        <div class="input-group" id="group3" style="display:none;">
            <label>上底 (a):</label>
            <input type="number" id="val3" value="100" min="30" max="250">
        </div>
    </div>

    <button onclick="startDemonstration()" style="width: 100%; font-size: 18px;">▶ 開始動畫演示</button>

    <div id="canvas-container"></div>
    <div class="explanation" id="explanationText">請輸入參數並開始演示。</div>
</div>

<script>
    const svgNS = "http://www.w3.org/2000/svg";
    
    function resetUI() {
        const type = document.getElementById('shapeType').value;
        document.getElementById('group3').style.display = (type === 'trapezoid') ? 'flex' : 'none';
        document.getElementById('canvas-container').innerHTML = '';
        document.getElementById('explanationText').innerText = "準備就緒。";
    }

    function createSvgCanvas() {
        const container = document.getElementById('canvas-container');
        container.innerHTML = '';
        let svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("width", "100%"); svg.setAttribute("height", "100%");
        svg.setAttribute("viewBox", "0 0 800 380");
        container.appendChild(svg);
        return svg;
    }

    function startDemonstration() {
        const type = document.getElementById('shapeType').value;
        const b = parseFloat(document.getElementById('val1').value);
        const h = parseFloat(document.getElementById('val2').value);
        const a = parseFloat(document.getElementById('val3').value);
        const svg = createSvgCanvas();
        
        const startX = 200, startY = 250;

        if (type === 'triangle') {
            const topIdx = 60; // 頂點相對於左下角的水平位移
            const pts = `0,0 ${b},0 ${topIdx},-${h}`;
            
            let t1 = drawPoly(svg, pts, "var(--primary)", startX, startY);
            // 初始讓黃色三角形稍微分開一點
            let t2 = drawPoly(svg, pts, "var(--secondary)", startX + b + 50, startY);
            t2.style.transformOrigin = `${b/2}px -${h/2}px`;

            document.getElementById('explanationText').innerText = "拿兩個完全一樣的三角形，將第二個旋轉 180 度...";

            setTimeout(() => {
                t2.style.transform = `translate(${startX + b + 50}px, ${startY}px) rotate(180deg)`;
            }, 500);

            setTimeout(() => {
                // 最終拼合位置修正：
                // 藍色三角形頂點在 startX + topIdx
                // 旋轉後的黃色三角形左上角對接藍色頂點，因此 X 位移應為 startX + topIdx
                t2.style.transform = `translate(${startX + topIdx}px, ${startY}px) rotate(180deg)`;
                document.getElementById('explanationText').innerText = "向左移動拼合！組成一個底為 b、高為 h 的平行四邊形。";
                
                addLabel(svg, startX, startY + 20, startX + b, startY + 20, `底 b=${b}`);
                addLabel(svg, startX + topIdx, startY, startX + topIdx, startY - h, `高 h=${h}`, -15);
            }, 2000);

        } else if (type === 'trapezoid') {
            const off = 40; // 梯形斜率偏移
            const pts = `0,0 ${b},0 ${a+off},-${h} ${off},-${h}`;
            
            let t1 = drawPoly(svg, pts, "var(--primary)", startX, startY);
            let t2 = drawPoly(svg, pts, "var(--success)", startX + b + 50, startY);
            t2.style.transformOrigin = `${b/2}px -${h/2}px`;

            document.getElementById('explanationText').innerText = "拿兩個一樣的梯形，將第二個旋轉 180 度...";

            setTimeout(() => {
                t2.style.transform = `translate(${startX + b + 50}px, ${startY}px) rotate(180deg)`;
            }, 500);

            setTimeout(() => {
                // 最終拼合位置修正：
                // 綠色梯形倒過來後，其左上角應對接藍色梯形的右上角 (startX + a + off)
                t2.style.transform = `translate(${startX + off + a}px, ${startY}px) rotate(180deg)`;
                document.getElementById('explanationText').innerText = "拼湊成一個大的平行四邊形！底為 (上底 a + 下底 b)。";
                
                addLabel(svg, startX + off, startY - h - 15, startX + a + off, startY - h - 15, `上底 a=${a}`);
                addLabel(svg, startX, startY + 20, startX + b, startY + 20, `下底 b=${b}`);
                addLabel(svg, startX, startY + 50, startX + b + a, startY + 50, `平行四邊形的底 = a + b = ${a+b}`);
            }, 2000);

        } else {
            // 平行四邊形邏輯
            const cut = 40;
            const ptsMain = `${cut},0 ${b+cut},0 ${b+cut},-${h} ${cut},-${h}`;
            const ptsTri = `0,0 ${cut},0 ${cut},-${h}`;
            
            let m = drawPoly(svg, ptsMain, "var(--primary)", startX, startY);
            let t = drawPoly(svg, ptsTri, "var(--error)", startX, startY);

            document.getElementById('explanationText').innerText = "切割平行四邊形...";

            setTimeout(() => {
                t.style.transform = `translate(${startX + b}px, ${startY}px)`;
                document.getElementById('explanationText').innerText = "補成矩形，面積 = 底 × 高。";
                addLabel(svg, startX + cut, startY + 20, startX + b + cut, startY + 20, `底 b=${b}`);
                addLabel(svg, startX + b + cut + 10, startY, startX + b + cut + 10, startY - h, `h=${h}`, 15);
            }, 800);
        }
    }

    function drawPoly(svg, pts, color, x, y) {
        let p = document.createElementNS(svgNS, "polygon");
        p.setAttribute("points", pts);
        p.setAttribute("fill", color);
        p.setAttribute("class", "shape");
        p.style.transform = `translate(${x}px, ${y}px)`;
        svg.appendChild(p);
        return p;
    }

    function addLabel(svg, x1, y1, x2, y2, txt, xOff = 0) {
        let g = document.createElementNS(svgNS, "g");
        g.setAttribute("class", "label-fade");
        let l = document.createElementNS(svgNS, "line");
        l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
        l.setAttribute("class", "measure-line");
        let t = document.createElementNS(svgNS, "text");
        t.setAttribute("x", (x1+x2)/2 + xOff); t.setAttribute("y", (y1+y2)/2 + 5);
        t.setAttribute("class", "measure-text"); t.setAttribute("text-anchor", "middle");
        t.textContent = txt;
        g.appendChild(l); g.appendChild(t);
        svg.appendChild(g);
    }
</script>
</body>
</html>
